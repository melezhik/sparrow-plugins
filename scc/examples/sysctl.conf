# /etc/sysctl.conf
# Kernel sysctl configuration file

# Comments and blank lines should be ignored

# Network settings
net.ipv4.tcp_syncookies = 1
net.ipv4.ip_forward = 1                    # INCORRECT: should be 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ICMP settings
net.ipv4.conf.all.accept_redirects = 1     # INCORRECT: should be 0
net.ipv4.conf.default.accept_redirects = 0

# Martian packet logging
net.ipv4.conf.all.log_martians = 0         # INCORRECT: should be 1

# Additional valid entries
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_max_syn_backlog = 4096
net.core.somaxconn = 1024
vm.swappiness = 10

# Malformed lines that should be caught
net.ipv4..tcp_syncookies = 1               # double dot in key
net.ipv4.conf.all.rp_filter =              # missing value
some.random.setting.with.very.long.value = aaaaaaaaaabbbbbbbbbbccccccccccddddddddddeeeeeeeeeeffffffffffgggggggggghhhhhhhhhhiiiiiiiiiijjjjjjjjjjkkkkkkkkkkllllllllllmmmmmmmmmmnnnnnnnnnnooooooooooppppppppppqqqqqqqqqqrrrrrrrrrrssssssssssttttttttttuuuuuuuuuuvvvvvvvvvvwwwwwwwwwwxxxxxxxxxxyyyyyyyyyyzzzzzzzzzz

# End of file
