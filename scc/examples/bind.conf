[options]
directory = "/var/named";
listen-on = { 192.168.0.1; };

[zone "example.com"]
type = master;
file = "db.example.com";
; missing masters field

[zone "example.org"]
type = slave;
file = "slaves/db.example.org";
masters = { 192.168.1.1; };

[zone "example.net"]
type = hint;                         ; invalid type (not master or slave)
file = "db.example.net";
masters = { 192.168.1.2; };

[zone "test.local"]
type = master;
file = "db.test.local";
masters = { 10.0.0.1; };            ; correct
